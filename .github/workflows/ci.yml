name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Type check Workspace
        run: npm run typecheck

      - name: Lint Workspace
        run: npm run lint
        continue-on-error: true # Opcional: ignorar advertencias de lint en PRs

      - name: Build Web
        run: npm run build:web

      - name: Build Admin
        run: npm run build:admin
